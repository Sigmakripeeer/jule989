<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Лови подарки</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background: #16080e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .game-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 800px;
      background: radial-gradient(circle at 20% 20%, #2f1620, #1a0b11);
      border-radius: 36px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 215, 150, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 16px 20px;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px 12px 6px;
      color: #f7e3d4;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    }

    .hud span {
      background: rgba(0, 0, 0, 0.35);
      padding: 6px 14px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 200, 150, 0.12);
    }

    .hud .score {
      color: #fbd9b0;
    }

    .stage {
      flex: 1;
      position: relative;
      border-radius: 24px;
      background: radial-gradient(circle at 50% 80%, #35212b, #1d0e14);
      box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      touch-action: none;
      cursor: none;
      border: 1px solid rgba(255, 180, 120, 0.1);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, #ffffff25 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: .18;
      animation: stars 12s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes stars {
      from { transform: translateY(0); }
      to { transform: translateY(32px); }
    }

    .falling {
      display:flex;
      align-items:center;
      justify-content:center;
      position: absolute;
      font-size: 42px;
      top: -50px;
      will-change: transform;
      pointer-events: none;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.5));
      z-index: 10;
      transition: none;
    }
  .falling img{
    width:64px;
    height:64px;
    object-fit:contain;
    pointer-events:none;
}

    .basket {
      position: absolute;
      bottom: 16px;
      font-size: 52px;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 20;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
      transition: transform 0.08s ease, filter 0.15s;
    }

    .basket.glow {
      filter: drop-shadow(0 0 20px #ffb07c) drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
    }

    .center-msg {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 28px;
      background: rgba(10, 4, 7, 0.82);
      backdrop-filter: blur(8px);
      z-index: 30;
      border-radius: 24px;
      animation: fadeIn 0.4s ease;
    }

    .center-msg.show {
      display: flex;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    .center-msg .big {
      font-weight: 900;
      font-size: clamp(32px, 10vw, 48px);
      color: #fdccb0;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .center-msg .gold {
      color: #fad6a8;
      text-shadow: 0 0 30px rgba(255, 200, 100, 0.2);
    }

    .center-msg .sub {
      color: #c8aea0;
      font-size: 15px;
      max-width: 280px;
      line-height: 1.5;
      margin-top: 6px;
    }

    .center-msg .taunt {
      font-size: clamp(36px, 12vw, 56px);
      font-weight: 800;
      color: #ffb08c;
      text-shadow: 0 0 40px rgba(255, 100, 50, 0.3);
    }

    .center-msg .key-icon {
      font-size: 64px;
      margin-bottom: 6px;
      animation: pulse 1.6s infinite;
    }

    .center-msg .key-line {
      font-size: clamp(28px, 8vw, 38px);
      font-weight: 800;
      color: #fad6a8;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .btn {
      margin-top: 24px;
      padding: 14px 34px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 60px;
      background: #fad6a8;
      color: #1a0b11;
      box-shadow: 0 8px 24px rgba(250, 200, 130, 0.25);
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: scale(1.03);
      background: #ffe2be;
      box-shadow: 0 12px 32px rgba(250, 200, 130, 0.35);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .start-hint {
      color: #b89a88;
      font-size: 14px;
      max-width: 300px;
      line-height: 1.6;
      margin: 8px 0 4px;
    }

    @media (max-width: 420px) {
      .falling { font-size: 36px; }
      .basket { font-size: 44px; bottom: 12px; }
      .game-wrap { padding: 12px 12px 16px; border-radius: 24px; }
    }

    .stage * {
      cursor: none;
    }
  </style>
</head>
<body>

<div class="game-wrap">
  <div class="hud">
    <span>⏱ <span id="timerText">0</span>с</span>
    <span class="score">🎁 <span id="scoreText">0</span></span>
  </div>

  <div class="stage" id="stage">
    <div class="center-msg show" id="startScreen">
      <div class="big gold">Лови подарки</div>
      <div class="start-hint">Води корзиной, чтобы поймать 🎁. Осторожно — 💣 всё портят!</div>
      <button class="btn" id="startBtn">▶ Начать</button>
    </div>

    <div class="center-msg" id="gameOverScreen">
      <div class="big" style="color:#ff7a5a;">💥 БУМ!</div>
      <div class="sub">Ты поймала бомбу…</div>
      <button class="btn" id="restartBtn">🔄 Заново</button>
    </div>

    <div class="center-msg" id="tauntScreen">
      <div class="taunt">Ха-ха!</div>
      <div class="sub">дурочка</div>
    </div>

    <div class="center-msg" id="winScreen">
      <div class="key-icon">🔑</div>
      <div class="key-line">Ты поймала ключ!</div>
      <div class="sub">Скоро тут появится ключ на игру в стиме:)</div>
    </div>
  </div>
</div>

<script>
  (function() {
    const stage = document.getElementById('stage');
    const timerText = document.getElementById('timerText');
    const scoreText = document.getElementById('scoreText');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const restartBtn = document.getElementById('restartBtn');
    const tauntScreen = document.getElementById('tauntScreen');
    const winScreen = document.getElementById('winScreen');

    let W, H;
    const basketSize = 48;
    let basketX;
    let basketEl;

    let objects = [];
    let running = false;
    let elapsed = 0;
    let score = 0;
    let phase = 'idle';

    let secondInterval = null;
    let spawnInterval = null;
    let rafId = null;

    const rand = (min, max) => Math.random() * (max - min) + min;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    function resetGame() {
      objects.forEach(o => o.el.remove());
      objects = [];
      elapsed = 0;
      score = 0;
      scoreText.textContent = '0';
      timerText.textContent = '0';
      phase = 'idle';

      if (basketEl) basketEl.remove();
      basketEl = document.createElement('div');
      basketEl.className = 'basket';
      basketEl.textContent = '🧺';
      stage.appendChild(basketEl);

      W = stage.clientWidth;
      H = stage.clientHeight;
      basketX = W / 2;
      positionBasket();

      hideAllScreens();
    }

    function positionBasket() {
      basketX = clamp(basketX, basketSize / 2, W - basketSize / 2);
      basketEl.style.left = basketX + 'px';
    }

    function hideAllScreens() {
      [startScreen, gameOverScreen, tauntScreen, winScreen].forEach(s => s.classList.remove('show'));
    }

    function startGame() {
      resetGame();
      hideAllScreens();
      running = true;
      phase = 'phase1';
      score = 0;
      scoreText.textContent = '0';
      elapsed = 0;
      timerText.textContent = '0';

      startSpawning(950);

      secondInterval = setInterval(() => {
        elapsed += 1;
        timerText.textContent = elapsed;

        if (elapsed === 14 && phase === 'phase1') {
          phase = 'phase2';
          startSpawning(680);
        }

        if (elapsed === 34 && phase === 'phase2') {
          clearInterval(secondInterval);
          clearInterval(spawnInterval);
          beginFinale();
        }
      }, 1000);

      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(gameLoop);
    }

    function startSpawning(ms) {
      clearInterval(spawnInterval);
      spawnInterval = setInterval(() => {
        if (!running) return;

        // Проверяем последний объект, чтобы подарки не догоняли друг друга
        const last = objects[objects.length - 1];
        if (last && last.y < 140) {
          return;
        }

        const isBomb = (phase === 'phase2' && Math.random() < 0.28);
        createFalling(isBomb ? 'bomb' : 'gift', rand(4.8, 7.2));
      }, ms);
    }

    function createFalling(type, duration, opts = {}) {
      const el = document.createElement('div');
      el.className = 'falling';
      el.innerHTML = type === 'bomb'
    ? '<img src="бомба.png">'
    : '<img src="торт.png">';
      stage.appendChild(el);

      const x = opts.x !== undefined ? opts.x : rand(30, W - 30);
      el.style.left = x + 'px';

      const obj = {
        el,
        type,
        x,
        y: -60,
        duration: duration * 1000,
        born: performance.now(),
        caught: false,
        special: opts.special || null,
        trickSwitched: false,
        switchTime: 0,
        removed: false,
        angle: 0,
        rotateSpeed: rand(-3, 3),
      };

      objects.push(obj);
      return obj;
    }

    function gameLoop(ts) {
      if (!running) {
        rafId = null;
        return;
      }

      const basketY = H - 64;

      for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        if (obj.removed) continue;

        const dt = (ts - obj.born);

        // special trick
        if (obj.special === 'trick') {
          if (!obj.trickSwitched) {
            const progress = Math.min(dt / obj.duration, 1);
            const ease = progress * progress;
            obj.y = -60 + ease * (basketY + 60);
            obj.angle += obj.rotateSpeed;
            if (progress >= 1) {
              obj.trickSwitched = true;
              obj.switchTime = ts;
            }
          } else {
            const fast = (ts - obj.switchTime) / 160;
            const startY = basketY;
            obj.y = startY + Math.min(fast, 1) * (H - startY);
            obj.angle += obj.rotateSpeed;
            if (fast >= 1) {
              obj.removed = true;
              obj.el.remove();
              objects.splice(i, 1);
              onTrickMiss();
            }
          }
          obj.el.style.transform = `translateX(-50%) translateY(${obj.y}px) rotate(${obj.angle}deg)`;
          continue;
        }

        // normal fall с ускорением
        const progress = Math.min(dt / obj.duration, 1);
        const ease = progress * progress;
        obj.y = -60 + ease * (H + 60);
        obj.angle += obj.rotateSpeed;
        obj.el.style.transform = `translateX(-50%) translateY(${obj.y}px) rotate(${obj.angle}deg)`;

        // столкновение с корзиной (без зоны ожидания)
        if (!obj.caught && obj.special !== 'trick') {
          const hit = Math.abs(obj.x - basketX) < 34 && Math.abs(obj.y - basketY) < 34;
          if (hit) {
            obj.caught = true;
            obj.removed = true;
            obj.el.remove();
            objects.splice(i, 1);

            if (obj.type === 'bomb') {
              triggerGameOver('💥 Ты поймал бомбу!');
              return;
            } else if (obj.special === 'final') {
              triggerWin();
              return;
            } else {
              score += 1;
              scoreText.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.45)' }, { transform: 'scale(1)' }], {
                duration: 220
              });
              scoreText.textContent = score;
              basketEl.classList.add('glow');
              setTimeout(() => basketEl.classList.remove('glow'), 140);

              // эффект ✨
              const burst = document.createElement('div');
              burst.textContent = '✨';
              burst.style.position = 'absolute';
              burst.style.left = obj.x + 'px';
              burst.style.top = obj.y + 'px';
              burst.style.fontSize = '34px';
              burst.style.transition = '0.45s';
              burst.style.pointerEvents = 'none';
              burst.style.zIndex = '25';
              stage.appendChild(burst);
              requestAnimationFrame(() => {
                burst.style.transform = 'scale(2)';
                burst.style.opacity = '0';
              });
              setTimeout(() => burst.remove(), 450);
            }
            continue;
          }
        }

        // если подарок упал мимо — просто исчезает, очко не засчитывается
        if (obj.y > H + 30) {
          obj.removed = true;
          obj.el.remove();
          objects.splice(i, 1);
          continue;
        }
      }

      rafId = requestAnimationFrame(gameLoop);
    }

    function onTrickMiss() {
      phase = 'taunt';
      hideAllScreens();
      tauntScreen.classList.add('show');
      setTimeout(() => {
        hideAllScreens();
        phase = 'finalFall';
        createFalling('gift', 5.5, { x: W / 2, special: 'final' });
      }, 1400);
    }

    function beginFinale() {
      phase = 'freeze';
      objects.forEach(o => o.el.remove());
      objects = [];
      createFalling('gift', 3.0, { x: basketX, special: 'trick' });
      phase = 'trick';
    }

    function triggerGameOver(reason) {
      running = false;
      clearInterval(secondInterval);
      clearInterval(spawnInterval);
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      objects.forEach(o => o.el.remove());
      objects = [];
      hideAllScreens();
      gameOverScreen.querySelector('.sub').textContent = reason || 'Ты поймал бомбу…';
      gameOverScreen.classList.add('show');
    }

    function triggerWin() {
      running = false;
      clearInterval(secondInterval);
      clearInterval(spawnInterval);
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      objects.forEach(o => o.el.remove());
      objects = [];
      hideAllScreens();
      winScreen.classList.add('show');
    }

    function moveBasket(clientX) {
      const rect = stage.getBoundingClientRect();
      basketX = clientX - rect.left;
      positionBasket();
    }

    stage.addEventListener('mousemove', (e) => {
      if (!running) return;
      moveBasket(e.clientX);
    });

    stage.addEventListener('touchmove', (e) => {
      if (!running) return;
      const touch = e.touches[0];
      if (touch) {
        moveBasket(touch.clientX);
        e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('keydown', (e) => {
      if (!running) return;
      if (e.key === 'ArrowLeft') { basketX -= 30; positionBasket(); e.preventDefault(); }
      if (e.key === 'ArrowRight') { basketX += 30; positionBasket(); e.preventDefault(); }
    });

    window.addEventListener('resize', () => {
      W = stage.clientWidth;
      H = stage.clientHeight;
      if (basketEl) positionBasket();
    });

    startBtn.addEventListener('click', () => {
      startGame();
    });

    restartBtn.addEventListener('click', () => {
      startGame();
    });

    window.addEventListener('load', () => {
      W = stage.clientWidth;
      H = stage.clientHeight;
      resetGame();
      startScreen.classList.add('show');
    });

    document.addEventListener('touchmove', (e) => {
      if (e.target.closest('.stage')) e.preventDefault();
    }, { passive: false });

  })();
</script>

</body>
</html>
